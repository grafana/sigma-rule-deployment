name: Config Validator
description: "Validate configuration file against the JSON schema"
branding:
  icon: check-circle
  color: green
inputs:
  config_file:
    description: "Path to the configuration file to validate, relative to the root of the repository"
    required: false
    default: "config.yml"
  v2_schema_file:
    description: "Path to the v2 JSON schema file, relative to the root of the repository. Defaults to the schema bundled with this action."
    required: false
    default: ""
  v1_schema_file:
    description: "Path to the v1 JSON schema file, relative to the root of the repository. Defaults to the schema bundled with this action."
    required: false
    default: ""
  github_token:
    description: "GitHub token used to post a PR comment when a v1 configuration is detected. If omitted, no comment is posted."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
    - name: Install dependencies
      shell: bash
      run: pip install check-jsonschema==0.33.3 pyyaml
    - name: Validate configuration
      shell: bash
      env:
        INPUTS_CONFIG_FILE: ${{ inputs.config_file }}
        INPUTS_V2_SCHEMA_FILE: ${{ inputs.v2_schema_file }}
        INPUTS_V1_SCHEMA_FILE: ${{ inputs.v1_schema_file }}
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        WORKSPACE_REAL=$(realpath "$GITHUB_WORKSPACE")

        # Resolve config file path
        CONFIG_PATH=$(realpath "${GITHUB_WORKSPACE}/${INPUTS_CONFIG_FILE}" 2>/dev/null)
        if [ -z "$CONFIG_PATH" ]; then
          echo "Error: Failed to resolve config file path '${INPUTS_CONFIG_FILE}'"
          exit 1
        fi
        if [[ "$CONFIG_PATH" != "$WORKSPACE_REAL"* ]]; then
          echo "Error: Config file path '${INPUTS_CONFIG_FILE}' resolves outside workspace boundaries"
          exit 1
        fi
        if [ ! -f "$CONFIG_PATH" ]; then
          echo "Error: Config file not found at $CONFIG_PATH"
          exit 1
        fi

        # Resolve schema paths — use user-provided paths if given, otherwise fall back to bundled schemas
        resolve_schema_path() {
          local input="$1"
          local default_path="$2"
          local label="$3"
          local resolved

          if [ -n "$input" ]; then
            resolved=$(realpath "${GITHUB_WORKSPACE}/${input}" 2>/dev/null)
            if [ -z "$resolved" ] || [[ "$resolved" != "$WORKSPACE_REAL"* ]]; then
              echo "Error: ${label} path '${input}' is invalid or resolves outside workspace boundaries" >&2
              exit 1
            fi
          else
            resolved=$(realpath "$default_path" 2>/dev/null)
          fi

          if [ ! -f "$resolved" ]; then
            echo "Error: ${label} not found at $resolved" >&2
            exit 1
          fi

          echo "$resolved"
        }

        V2_SCHEMA_PATH=$(resolve_schema_path "$INPUTS_V2_SCHEMA_FILE" "${GITHUB_ACTION_PATH}/../../config/schema-v2.json" "v2 schema file")
        V1_SCHEMA_PATH=$(resolve_schema_path "$INPUTS_V1_SCHEMA_FILE" "${GITHUB_ACTION_PATH}/../../config/schema.json" "v1 schema file")

        # --- Try v2 schema first ---
        echo "Validating ${INPUTS_CONFIG_FILE} against v2 schema..."
        V2_OUTPUT=$(check-jsonschema --schemafile "$V2_SCHEMA_PATH" "$CONFIG_PATH" 2>&1)
        V2_EXIT=$?

        if [ $V2_EXIT -eq 0 ]; then
          echo "Configuration is valid (v2 format)"
          exit 0
        fi

        # --- Fall back to v1 schema ---
        echo "v2 validation failed, checking if config is valid v1 format..."
        V1_OUTPUT=$(check-jsonschema --schemafile "$V1_SCHEMA_PATH" "$CONFIG_PATH" 2>&1)
        V1_EXIT=$?

        if [ $V1_EXIT -eq 0 ]; then
          echo "Configuration matches v1 format — migration to v2 is required"

          # Generate suggested v2 config
          MIGRATED_FILE=$(mktemp)
          python3 "${GITHUB_ACTION_PATH}/../../scripts/migrate-config-v1-to-v2/migrate_v1_to_v2.py" "$CONFIG_PATH" > "$MIGRATED_FILE"

          # Post a PR comment if a token is available and we are in a PR context
          if [ -n "$GH_TOKEN" ] && [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            COMMENT_FILE=$(mktemp)
            {
              echo "## Configuration format update required"
              echo ""
              echo "The configuration file \`${INPUTS_CONFIG_FILE}\` uses the deprecated v1 format and must be updated to v2 before merging."
              echo ""
              echo "> [!NOTE]"
              echo "> The automated migration below is provided as a starting point. Any comments from your original configuration will have been lost — please review the output carefully before applying it."
              echo ""
              echo "<details>"
              echo "<summary>Suggested v2 configuration for <code>${INPUTS_CONFIG_FILE}</code></summary>"
              echo ""
              echo '```yaml'
              cat "$MIGRATED_FILE"
              echo '```'
              echo ""
              echo "</details>"
            } > "$COMMENT_FILE"
            gh pr comment HEAD --body-file "$COMMENT_FILE" --repo "$GITHUB_REPOSITORY"
            rm "$COMMENT_FILE"
          else
            echo "--- Suggested v2 configuration ---"
            cat "$MIGRATED_FILE"
            echo "----------------------------------"
          fi
          rm "$MIGRATED_FILE"

          echo "Please update your configuration to v2 format."
          exit 1
        fi

        # --- Both schemas failed: report v2 errors since that is the target format ---
        echo "Configuration is not valid in v1 or v2 format. Validation errors (v2 schema):"
        echo "$V2_OUTPUT"
        exit 1
