folders:
  conversions: ./conversions
  deployments: ./deployments
conversions:
  - name: Test Rule 1
    description: Tests that the first rule is converted correctly with it's pipelines
    outputs:
      - name: github_audit_test-1.json
        queries:
          - "{service_namespace=`cicd-o11y`} | logfmt | action=`repo.destroy`"
  - name: Test Combine Queries
    description: Tests that an OR condition splits a query into multiple queries
    outputs:
      - name: combine_queries_condition-split.json
        queries:
          - "{name=`test-datasource`} | json | username=`user1`"
          - "{name=`test-datasource`} | json | username=`user2`"
  - name: Manual Flag - Explicit Conversion
    description: A conversion file already marked manual is preserved (not overwritten) by convert
    outputs:
      - name: manual_explicit_manual-test.json
        manual: true
        queries:
          - "{name=`test-datasource`} | json | action=`SENTINEL_MANUAL_EXPLICIT_DO_NOT_OVERWRITE`"
  - name: Manual Flag - Backfilled Conversion
    description: A hand-edited conversion file is auto-flagged manual and preserved (not overwritten) by convert
    outputs:
      - name: manual_backfill_manual-test.json
        manual: true
        queries:
          - "{name=`test-datasource`} | json | action=`SENTINEL_MANUAL_BACKFILL_DO_NOT_OVERWRITE`"
integrations:
  - name: Test Integration 1
    description: Tests that the first integration is converted correctly with it's pipelines
    outputs:
      - name: github_audit_test-1
        alerting_rules:
          - refId: A0
            model:
              expr: sum(count_over_time({service_namespace=`cicd-o11y`} | logfmt | action=`repo.destroy`[$__auto]))
  - name: Test Combine Queries
    description: Tests that split queries are combined correctly
    outputs:
      - name: combine_queries_condition-split
        alerting_rules:
          - refId: A0
            model:
              expr: "sum(count_over_time({name=`test-datasource`} | json | username=`user1`[$__auto]))"
          - refId: A1
            model:
              expr: "sum(count_over_time({name=`test-datasource`} | json | username=`user2`[$__auto]))"
          - refId: B
            model:
              type: math
              expression: "${A0}+${A1}"
  - name: Manual Flag - Explicit Deployment
    description: A deployment file already marked manual is preserved (not overwritten) by integrate
    outputs:
      - name: manual_explicit_manual-test
        annotations:
          manual: "true"
        alerting_rules:
          - refId: A0
            model:
              expr: SENTINEL_DEPLOY_EXPLICIT_DO_NOT_OVERWRITE
  - name: Manual Flag - Backfilled Deployment
    description: A hand-edited deployment file is auto-flagged manual and preserved (not overwritten) by integrate
    outputs:
      - name: manual_backfill_manual-test
        annotations:
          manual: "true"
        alerting_rules:
          - refId: A0
            model:
              expr: SENTINEL_DEPLOY_BACKFILL_DO_NOT_OVERWRITE
