# Repo-local zizmor configuration.
#
# Why this file exists at all: the org reusable-zizmor workflow only fetches +
# caches the org default config when NO repo-local config is present, and that
# fetch is currently broken at the pinned ref (the config never lands on disk,
# so zizmor aborts with "no audit was performed"). Providing this file makes
# zizmor use it directly and skips the broken path.
#
# Contents mirror the grafana/shared-workflows default (.github/zizmor.yml):
# trust GitHub- and Grafana-owned actions unpinned (our internal
# grafana/sigma-rule-deployment/actions/* are referenced by tag, e.g. @v0.1.3);
# every other action must still be pinned to a full commit SHA. This is
# required — a config without these policies fails unpinned-uses (High) on the
# internal tag-pinned actions. It also satisfies the validate-zizmor-config
# policy gate (scoped patterns only; no disable; no universal "*": any).
rules:
  unpinned-uses:
    config:
      policies:
        actions/*: any # trust GitHub
        grafana/*: any # trust Grafana
